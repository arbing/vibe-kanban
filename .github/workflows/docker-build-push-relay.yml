name: Docker Build and Push Relay

on:
  workflow_dispatch:

concurrency:
  group: docker-build-push-relay-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Read version from Cargo.toml
        id: version
        run: |
          set -euo pipefail
          version=$(grep -m1 '^version = ' crates/relay-tunnel/Cargo.toml | sed -E 's/^version = "(.*)"/\1/')
          if [ -z "$version" ]; then
            echo "Failed to read version from crates/relay-tunnel/Cargo.toml" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Lowercase owner
        id: owner
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          echo "value=${OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.value }}/vibe-kanban/relay
          tags: |
            type=raw,value=latest
            type=raw,value=v${{ steps.version.outputs.version }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: crates/relay-tunnel/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=relay
          cache-to: type=gha,mode=max,scope=relay
